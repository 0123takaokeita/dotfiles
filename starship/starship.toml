# カスタムフォーマットを利用します
# scan_timeout: 大きめのリポジトリでも git_status が間に合うよう既定値に戻す
scan_timeout = 30
command_timeout = 1000

format = """
[┌───────────────────>](bold green) $time
[│](bold green)$git_branch$git_status
[│](bold green)$nodejs$python$golang$ruby$deno$lua$package
[│](bold green)$directory
[└─](bold green)$cmd_duration$character"""

[character]
success_symbol = "[➜](bold green) "
error_symbol = "[✗](bold red) "
vicmd_symbol = "[V](bold green) "

[cmd_duration]
# 2秒以上かかったコマンドの実行時間を表示
min_time = 2000
style = "bold yellow"
format = "[took $duration ]($style)"

[username]
style_user = "white bold"
style_root = "black bold"
format = "user: [$user]($style) "
show_always = true

[directory]
# disabled = true
# 深い階層でも行が伸びすぎないよう末尾5階層に省略
truncation_length = 5
truncation_symbol = "…/"
truncate_to_repo  = false
home_symbol = "~"
style = "bold blue"
format = "[$path]($style)"

[deno]
format = "[🦕 $version](green bold) "

[docker_context]
format = "via [🐋 $context](blue bold)"

[git_branch]
symbol = ""
# truncation_length = 10
truncation_symbol = ""
# ignore_branches = ["master", "main"]
format = "[$symbol $branch](bold purple)"

[git_status]
# 変更/staged/未追跡/stash/ahead-behind をブランチ名の右に表示
style = "bold yellow"
format = '([ \($all_status$ahead_behind\)]($style))'
conflicted = "✖${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "≡${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[lua]
symbol = ""
format = "[$symbol $version](bold blue) "

[ruby]
# disabled = true
symbol = " "
format = "[$symbol$version](bold red) "
detect_files = ["Rakefile", ".git"]

[package]
# disabled = true
symbol = " "
style = "bg:#545B68 fg:#EEEEEE"
display_private = false
format = "[[](bg:#545B68 fg:#A6A6A6)$symbol$version[](bg:#A6A6A6 fg:#545B68)]($style)"

[nodejs]
symbol = ""
format = "[$symbol $version](bold green) "

[python]
symbol = ""
format = "[$symbol $version](bold yellow) "

[golang]
symbol = ""
format = "[$symbol $version](bold cyan) "

[[battery.display]]
threshold = 100
style = "bold blue"

[time]
disabled = false
use_12hr = true
style = "bold yellow"
time_format = "%I:%M %p"
format = "[$time]($style)"
